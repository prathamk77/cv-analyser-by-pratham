kind = "web"
previewPath = "/"
title = "CV Analyser"
version = "1.0.0"
id = "artifacts/cv-analyser"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18721

[services.development]
run = "pnpm --filter @workspace/cv-analyser run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cv-analyser", "run", "build" ]
publicDir = "artifacts/cv-analyser/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18721"
BASE_PATH = "/"
